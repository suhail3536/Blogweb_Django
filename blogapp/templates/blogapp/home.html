<!DOCTYPE html>
<html>

<head>
    <title>My Blog</title>
</head>

<body>
   {% extends 'blogapp/base.html' %}

{% block content %}

<a href="/create/" class="btn">➕ Create Post</a>
<hr>

{% for post in posts %}
<div class="post">
    <h2>
        <a href="/post/{{ post.id }}/">
            {{ post.title }}
        </a>
    </h2>

    <p>{{ post.content|truncatewords:20 }}</p>

    <br>
    <a href="/edit/{{ post.id }}/" class="btn">✏️ Edit</a>
    <a href="/delete/{{ post.id }}/" class="btn delete">🗑 Delete</a>
</div>
{% endfor %}

{% endblock %}
   

</body>

</html>
